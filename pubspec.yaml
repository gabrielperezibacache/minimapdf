name: minimal_pdf
description: Lector de PDF y gestor de biblioteca ultraligero, offline (Minimal PDF).
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: any

  # Estado ligero (ChangeNotifier)
  provider: ^6.1.5

  # Base de datos local (Paso 2: modelos y CRUD)
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  pdfx: ^2.9.2
  http: ^1.6.0
  flutter_inappwebview: 6.2.0-beta.3
  flutter_downloader: ^1.12.0
  sqflite_common_ffi: ^2.4.2
  shared_preferences: ^2.5.5
  crypto: ^3.0.7
  pdf: ^3.11.3
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
