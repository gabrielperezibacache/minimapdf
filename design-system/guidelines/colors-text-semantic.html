<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:16px;background:var(--emerald-950);display:flex;flex-direction:column;gap:8px;font-family:var(--font-ui);font-size:13px}
.row{display:flex;align-items:center;gap:10px}
.sw{width:24px;height:24px;border-radius:4px;border:1px solid var(--emerald-850)}
</style></head><body>
<div class="row"><div class="sw" style="background:var(--parchment-50)"></div><span style="color:var(--parchment-50)">Text primary — Warm Parchment #F3ECDD</span></div>
<div class="row"><div class="sw" style="background:var(--sage-400)"></div><span style="color:var(--sage-400)">Text secondary — Sage Muted #A8B4A5</span></div>
<div class="row"><div class="sw" style="background:var(--red-500)"></div><span style="color:var(--red-500)">Danger #C0604A</span></div>
<div class="row"><div class="sw" style="background:var(--green-500)"></div><span style="color:var(--green-500)">Success #7FA07A</span></div>
</body></html>
