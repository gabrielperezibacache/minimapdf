<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:16px;background:var(--color-bg-canvas);display:flex;align-items:flex-end;gap:6px}
.b{background:var(--color-accent)}
.l{color:var(--color-text-secondary);font-family:var(--font-ui);font-size:10px;text-align:center;margin-top:4px}
</style></head><body>
<div><div class="b" style="width:var(--space-1);height:var(--space-1)"></div><div class="l">4</div></div>
<div><div class="b" style="width:var(--space-2);height:var(--space-2)"></div><div class="l">8</div></div>
<div><div class="b" style="width:var(--space-3);height:var(--space-3)"></div><div class="l">12</div></div>
<div><div class="b" style="width:var(--space-4);height:var(--space-4)"></div><div class="l">16</div></div>
<div><div class="b" style="width:var(--space-6);height:var(--space-6)"></div><div class="l">24</div></div>
<div><div class="b" style="width:var(--space-8);height:var(--space-8)"></div><div class="l">32</div></div>
<div><div class="b" style="width:var(--space-12);height:var(--space-12)"></div><div class="l">48</div></div>
</body></html>
