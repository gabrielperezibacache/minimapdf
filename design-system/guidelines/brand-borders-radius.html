<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>

.c{width:120px;height:100px;display:flex;align-items:center;justify-content:center;background:var(--color-bg-surface);border:1px solid var(--color-border)}

</body></html>
