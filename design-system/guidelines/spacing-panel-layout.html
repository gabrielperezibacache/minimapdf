<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>
body{margin:0;padding:16px;background:var(--color-bg-canvas)}
.wrap{display:flex;height:110px;border:1px solid var(--color-border);border-radius:var(--radius-lg);overflow:hidden;font-family:var(--font-ui);font-size:11px;color:var(--color-text-secondary)}
.p{display:flex;align-items:center;justify-content:center;border-right:1px solid var(--color-border)}
</style></head><body>
<div class="wrap">
<div class="p" style="width:132px;background:var(--color-bg-sidebar)">Sidebar 264px</div>
<div class="p" style="flex:1;background:var(--color-bg-canvas);border-right:none">Reader (fluid)</div>
<div class="p" style="width:160px;background:var(--color-bg-sidebar);border-right:none">Tool Drawer 320px</div>
</div>
</body></html>
