<!DOCTYPE html><html><head><link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{background:var(--color-bg-canvas);padding:16px}</style>
</head><body><div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Input, Select, Checkbox, Radio, Switch } = window.MinimaPDFHermesObsidianDesignSystem_1b8fb1;
function Bookmark(){return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 3h12v18l-6-4-6 4V3z"/></svg>;}
function Search(){return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>;}
function App(){
const [chk,setChk]=React.useState(true);
const [rad,setRad]=React.useState('dark');
const [sw,setSw]=React.useState(true);
return <div style={{display:'flex',flexDirection:'column',gap:16,fontFamily:'var(--font-ui)'}}>
<div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
<Button variant="primary">Add document</Button>
<Button variant="secondary">Cancel</Button>
<Button variant="ghost">Skip</Button>
<Button variant="danger">Delete</Button>
<Button variant="primary" disabled>Disabled</Button>
</div>
<div style={{display:'flex',gap:10}}>
<IconButton title="Bookmark" active><Bookmark/></IconButton>
<IconButton title="Search"><Search/></IconButton>
</div>
<div style={{display:'flex',gap:10}}>
<Input placeholder="Search library…" icon={<Search/>} />
<Select options={[{label:'Fit width',value:'w'},{label:'Fit page',value:'p'}]} value="w" />
</div>
<div style={{display:'flex',gap:20,alignItems:'center'}}>
<Checkbox checked={chk} label="Hide read documents" onChange={()=>setChk(!chk)} />
<Radio checked={rad==='dark'} label="Low-Glare Dark" onChange={()=>setRad('dark')} />
<Radio checked={rad==='light'} label="Light Canvas" onChange={()=>setRad('light')} />
<Switch checked={sw} onChange={()=>setSw(!sw)} />
</div>
</div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
